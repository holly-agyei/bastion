syntax = "proto3";

package bastion.v1;

option java_multiple_files = true;
option java_package = "com.bastion.proto";
option java_outer_classname = "ServiceProto";

service BackendService {
  rpc ProcessRequest(ProcessRequestRequest) returns (ProcessRequestResponse);
  rpc ProcessStream(stream ProcessRequestRequest) returns (stream ProcessRequestResponse);
}

message ProcessRequestRequest {
  string request_id = 1;
  string client_id = 2;
  string path = 3;
  bytes payload = 4;
  map<string, string> headers = 5;
  int64 client_ts_ms = 6;
}

message ProcessRequestResponse {
  string request_id = 1;
  int32 status_code = 2;
  bytes payload = 3;
  int64 server_ts_ms = 4;
  string node_id = 5;
}
