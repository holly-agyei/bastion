name: bastion

services:
  redis:
    image: redis:7.4-alpine
    command: >-
      redis-server
      --save ""
      --appendonly no
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --io-threads 4
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 2s
      retries: 30

  kafka:
    image: apache/kafka:3.7.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: "6"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "1"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      CLUSTER_ID: "bastion-cluster-id-1"
    ports:
      - "9094:9094"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 2s
      timeout: 5s
      retries: 60
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      PORT: "9090"
      # Backend "work" is intentionally cheap so the headline numbers
      # reflect gateway + transport, not synthetic upstream cost.
      SIMULATED_WORK_US: "100"
      NODE_ID: "backend-1"
    expose:
      - "9090"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 768M

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    environment:
      LISTEN_ADDR: ":8080"
      BACKEND_TARGETS: "backend:9090"
      BACKEND_POOL_SIZE: "32"
      REDIS_ADDR: "redis:6379"
      REDIS_SHARDS: "64"
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_TOPIC: "telemetry.rejections"
      WINDOW_MS: "1000"
      DEFAULT_LIMIT: "200"
      CLIENT_HEADER: "X-Client-Id"
      GOMAXPROCS: "4"
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      backend:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "3.0"
          memory: 512M

  autoscaler:
    build:
      context: .
      dockerfile: autoscaler/Dockerfile
    environment:
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_TOPIC: "telemetry.rejections"
      WINDOW_SEC: "5"
      THRESHOLD: "1000"
      COOLDOWN_SEC: "30"
    depends_on:
      kafka:
        condition: service_healthy
